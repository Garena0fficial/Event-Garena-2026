<!DOCTYPE html>

        .item-name { font-size: 12px; margin: 10px 0; font-weight: bold; height: 35px; }
        .btn-claim { display: block; background: linear-gradient(180deg, #fbc02d, #f57f17); color: black; text-decoration: none; padding: 8px; border-radius: 5px; font-weight: bold; font-size: 13px; }
    </style>
</head>
